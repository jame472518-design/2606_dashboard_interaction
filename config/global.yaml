# 平台預設；移植 Halo 只改這裡
mode: hub                 # hub=首頁可切換 / single=鎖定一個租戶
active_tenant: project1_cute_dragon   # single 模式時生效
llm:
  provider: ollama
  model: qwen2.5vl:3b     # 開發用現有模型；Halo 改 qwen2.5:14b
  base_url: http://localhost:11434
embedding:
  model: bge-m3            # 中文判別力佳；nomic-embed-text 對中文 grounding 不堪用
server:
  port: 8080
  default_lang: zh-TW
retrieval:
  top_k: 4
  min_score: 0.45         # 低於此視為「沒命中」→ grounding fallback
                          # bge-m3 實測：相關問題 ≥0.62、無關 ≤0.38，0.45 落在空檔中央
