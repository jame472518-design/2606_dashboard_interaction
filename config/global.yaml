# 平台預設；移植 Halo 只改這裡
mode: hub                 # hub=首頁可切換 / single=鎖定一個租戶
active_tenant: project1_cute_dragon   # single 模式時生效
llm:
  provider: ollama
  model: qwen2.5vl:3b     # 開發用現有模型；Halo 改 qwen2.5:14b
  base_url: http://localhost:11434
embedding:
  model: bge-m3            # 中文判別力佳；nomic-embed-text 對中文 grounding 不堪用
server:
  port: 8080
  default_lang: zh-TW
retrieval:
  top_k: 4
  min_score: 0.45         # 低於此視為「沒命中」→ grounding fallback
                          # bge-m3 實測：相關問題 ≥0.62、無關 ≤0.38，0.45 落在空檔中央
ui:                       # 介面預設；每個 tenant 可在 tenant.yaml 覆寫
  quick:                  # 快捷鈕（要對應該租戶實際有的知識，按了才不會落空）
    zh-TW: ['營業時間', '票價', '推薦動線']
    en:    ['Hours', 'Tickets', 'Suggested route']
  fallback:               # LLM 出錯時的兜底句（一般沒命中知識是走人設寒暄，不會用到這個）
    zh-TW: '這我不太確定，可以問問服務台喔！'
    en:    "I'm not sure about that — please ask our front desk!"
theme:                    # UI 配色（前端套到 CSS 變數）；每個 tenant 可覆寫
  primary_color: "#7CB36A"
  primary_dark:  "#4f8a45"
  accent_color:  "#FFD23F"
  cream:         "#FBF3E2"
voice:                    # 語音預設（前端瀏覽器 TTS）；每個 tenant 可在 tenant.yaml 覆寫
  enabled: true           # 是否自動念出回覆
  rate: 1.0               # 語速 0.5–2.0
  pitch: 1.1              # 音調 0–2（高=童趣、低=沉穩）
  zh_voice: ""            # 指定中文語音名稱片段（空=自動選；例 "Hanhan"）
  en_voice: ""            # 指定英文語音名稱片段（空=自動選；例 "Zira"）
character:                # 形象渲染預設；客戶有自家 rig 素材時一律優先用素材
  render: live2d          # live2d=用 Live2D 模型 / rig=用 canvas 圖層(或程式占位)
  live2d_model: "https://cdn.jsdelivr.net/gh/guansss/pixi-live2d-display/test/assets/haru/haru_greeter_t03.model3.json"
                          # 通用預設角色（Haru）；客戶給素材前先用它，之後換成自家模型/素材
